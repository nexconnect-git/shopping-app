upstream backend {
    server backend:8000;
}

# Rate limiting zones (http context — included via conf.d)
limit_req_zone $binary_remote_addr zone=auth:10m rate=1r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

server {
    listen 80;
    server_name _;

    # All Angular dist files live under /sa/* in the container
    root /usr/share/nginx/html;
    charset utf-8;
    client_max_body_size 20M;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;
    gzip_vary on;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ── Redirect bare root to /sa/ ────────────────────────────────
    location = / {
        return 301 /sa/;
    }

    # ── Auth endpoints (tighter rate limit) ──────────────────────
    location ~ ^/sa/api/auth/(login|register)/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        rewrite ^/sa/api/(.*) /api/$1 break;
        proxy_pass         http://backend;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    # ── Django API ────────────────────────────────────────────────
    # proxy_pass with URI strips /sa from the upstream request
    location /sa/api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass         http://backend/api/;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    # ── Django Admin UI ───────────────────────────────────────────
    location /sa/django-admin/ {
        proxy_pass         http://backend/django-admin/;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    # ── WebSocket (Django Channels / Daphne) ──────────────────────
    location /sa/ws/ {
        proxy_pass         http://backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Django Media ──────────────────────────────────────────────
    location /sa/media/ {
        alias   /app/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Django Static ─────────────────────────────────────────────
    location /sa/django_static/ {
        alias   /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Admin Panel SPA ───────────────────────────────────────────
    location /sa/admin {
        try_files $uri $uri/ /sa/admin/index.html;
    }

    # ── Vendor App SPA ────────────────────────────────────────────
    location /sa/vendor {
        try_files $uri $uri/ /sa/vendor/index.html;
    }

    # ── Delivery App SPA ──────────────────────────────────────────
    location /sa/delivery {
        try_files $uri $uri/ /sa/delivery/index.html;
    }

    # ── Customer App SPA (catch-all under /sa/) ───────────────────
    location /sa {
        try_files $uri $uri/ /sa/index.html;
    }
}
