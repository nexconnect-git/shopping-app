upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;
    charset utf-8;

    # Nginx logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Customer App (Default)
    location / {
        alias /usr/share/nginx/html/customer/;
        try_files $uri $uri/ /index.html;
    }

    # Admin Panel
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Vendor App
    location /vendor/ {
        alias /usr/share/nginx/html/vendor/;
        try_files $uri $uri/ /vendor/index.html;
    }

    # Delivery App
    location /delivery/ {
        alias /usr/share/nginx/html/delivery/;
        try_files $uri $uri/ /delivery/index.html;
    }

    # Django Media
    location /media/ {
        alias /app/media/;
    }

    # Django Static
    location /django_static/ {
        alias /app/staticfiles/;
    }

    # Django API (Backend)
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # WebSocket Support (Daphne/Channels)
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
