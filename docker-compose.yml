x-backend-env: &backend-env
  DB_NAME: nc_shopping_app
  DB_USER: postgres
  DB_PASSWORD: admin
  DB_HOST: db
  REDIS_HOST: redis
  DEBUG: "True"
  SECRET_KEY: local-docker-dev-secret-key
  ALLOWED_HOSTS: localhost,127.0.0.1,backend,[::1],192.168.29.215
  CORS_ALLOW_ALL_ORIGINS: "True"
  RAZORPAY_KEY_ID: "${RAZORPAY_KEY_ID:-}"
  RAZORPAY_KEY_SECRET: "${RAZORPAY_KEY_SECRET:-}"
  RAZORPAY_WEBHOOK_SECRET: "${RAZORPAY_WEBHOOK_SECRET:-}"

services:

  # 🟢 Angular base image
  angular-base:
    build:
      context: .
      dockerfile: frontend/docker/Dockerfile
    image: angular-workspace

  admin:
    image: angular-workspace
    ports:
      - "4200:4200"
    command: sh -c "npm install --prefer-offline --no-audit && node scripts/write-runtime-config.mjs admin-panel && npx ng serve admin-panel --port 4200 --host 0.0.0.0"
    environment:
      API_PROXY_TARGET: http://backend:8000
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY:-}"
    volumes:
      - ./frontend:/app
      - ./packages:/packages:ro
      - /app/node_modules

  customer:
    image: angular-workspace
    ports:
      - "4201:4201"
    command: sh -c "npm install --prefer-offline --no-audit && node scripts/write-runtime-config.mjs customer-app && npx ng serve customer-app --port 4201 --host 0.0.0.0"
    environment:
      API_PROXY_TARGET: http://backend:8000
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY:-}"
    volumes:
      - ./frontend:/app
      - ./packages:/packages:ro
      - /app/node_modules

  vendor:
    image: angular-workspace
    ports:
      - "4202:4202"
    command: sh -c "npm install --prefer-offline --no-audit && node scripts/write-runtime-config.mjs vendor-app && npx ng serve vendor-app --port 4202 --host 0.0.0.0"
    environment:
      API_PROXY_TARGET: http://backend:8000
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY:-}"
    volumes:
      - ./frontend:/app
      - ./packages:/packages:ro
      - /app/node_modules

  delivery:
    image: angular-workspace
    ports:
      - "4203:4203"
    command: sh -c "npm install --prefer-offline --no-audit && node scripts/write-runtime-config.mjs delivery-app && npx ng serve delivery-app --port 4203 --host 0.0.0.0"
    environment:
      API_PROXY_TARGET: http://backend:8000
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY:-}"
    volumes:
      - ./frontend:/app
      - ./packages:/packages:ro
      - /app/node_modules

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    environment: *backend-env

  worker:
    build:
      context: ./backend
    command: python manage.py rqworker default
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    environment: *backend-env

  scheduler:
    build:
      context: ./backend
    command: python manage.py rqscheduler
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    environment: *backend-env

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    hostname: redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: nc_shopping_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
