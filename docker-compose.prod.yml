services:

  frontend:
    build:
      context: .
      dockerfile: frontend/docker/Dockerfile.prod
      args:
        GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
        GOOGLE_MAPS_MAP_ID: ${GOOGLE_MAPS_MAP_ID:-}
    image: frontend-prod
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - back_media:/app/media
      - back_static:/app/staticfiles
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # migrate + collectstatic run every time the container starts so new
    # migrations are applied automatically on every deploy without a separate
    # manual step.  Django's migrate is idempotent — already-applied
    # migrations are skipped and Postgres transactional DDL keeps concurrent
    # runs safe if the container is ever scaled.
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 backend.asgi:application"
    volumes:
      - back_media:/app/media
      - back_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py rqworker default
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    restart: always

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py rqscheduler
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    restart: always

  db:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-nc_shopping_app}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_prod:
  back_media:
  back_static:
